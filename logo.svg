<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 320 460" width="320" height="460">

  <defs>
    <!-- Brilho verde -->
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#27AE60" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Brilho azul -->
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#1565C0" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="320" height="460" fill="#0D1B2A" rx="28"/>

  <!-- ══ S VERDE — metade superior do 8 ══
       Posicionado normalmente, ocupa o topo do canvas. -->
  <text
    x="160" y="243"
    text-anchor="middle"
    font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif"
    font-size="310"
    font-weight="900"
    fill="#2ECC71"
    filter="url(#glow-green)">S</text>

  <!-- ══ S AZUL — metade inferior do 8, espelhado horizontalmente ══
       transform="matrix(-1,0,0,1,320,0)" reflete em torno de x=160:
         x_novo = -x + 320  →  o centro 160 fica em 160  ✓
         y_novo = y          →  posição vertical inalterada  ✓
       O glifo aparece como "S invertido lateralmente" (∫-like),
       completando a forma do 8 com o S verde acima. -->
  <text
    x="160" y="440"
    text-anchor="middle"
    font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif"
    font-size="310"
    font-weight="900"
    fill="#2E86DE"
    transform="matrix(-1,0,0,1,320,0)"
    filter="url(#glow-blue)">S</text>

</svg>