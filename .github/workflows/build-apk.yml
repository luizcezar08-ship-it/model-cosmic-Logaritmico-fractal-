name: Build Android APK

on:
  push:
    branches: ["claude/python-functional-system-app-zqfwmw", "main"]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Modelo S APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── 1. Código ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 3. Python ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 4. Dependências do sistema ───────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential git zip unzip \
            libffi-dev libssl-dev \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            cmake libsqlite3-dev \
            python3-pip

      # ── 5. Buildozer + Kivy ──────────────────────────────────────
      - name: Install Buildozer and Kivy
        run: |
          pip install --upgrade pip
          pip install buildozer==1.6.0 kivy==2.3.1 Cython==3.0.11

      # ── 6. Cache do Android SDK/NDK ──────────────────────────────
      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 7. Atualiza buildozer.spec para CI ───────────────────────
      - name: Patch buildozer.spec for CI
        run: |
          sed -i 's/^android.arch = .*/android.archs = arm64-v8a/' buildozer.spec
          sed -i '/^android.sdk =/d' buildozer.spec
          echo "android.accept_sdk_license = True" >> buildozer.spec

      # ── 8. Build APK ─────────────────────────────────────────────
      - name: Build debug APK
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log
        env:
          BUILDOZER_WARN_ON_ROOT: "1"

      # ── 9. Localiza o APK ────────────────────────────────────────
      - name: Find APK
        run: |
          find . -name "*.apk" -type f
          ls -lh bin/ 2>/dev/null || echo "bin/ not found"

      # ── 10. Upload APK como artifact ─────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: modelo-s-debug-apk
          path: bin/*.apk
          retention-days: 30

      # ── 11. Upload log em caso de falha ──────────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
